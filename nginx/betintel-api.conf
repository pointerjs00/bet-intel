# /etc/nginx/sites-available/betintel-api
# Symlink to enable: ln -s /etc/nginx/sites-available/betintel-api /etc/nginx/sites-enabled/
# TLS is added automatically by: certbot --nginx -d betintel-api.stream-intel.online

server {
    listen 80;
    server_name betintel-api.stream-intel.online;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts generous enough for scraping jobs
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
