name: Build & Deploy API

on:
  push:
    branches: [main]
    paths: ['apps/api/**', 'packages/shared/**']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/betintel-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create deploy env file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          APP_URL: ${{ secrets.APP_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SCRAPER_HTTP_PROXY: ${{ secrets.SCRAPER_HTTP_PROXY }}
        run: |
          cat > "$RUNNER_TEMP/api.env" <<EOF
          DATABASE_URL=${DATABASE_URL}
          JWT_SECRET=${JWT_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          REDIS_URL=${REDIS_URL}
          FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_USER=${SMTP_USER}
          SMTP_PASS=${SMTP_PASS}
          SMTP_FROM=${SMTP_FROM}
          APP_URL=${APP_URL}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
          API_FOOTBALL_KEY=${API_FOOTBALL_KEY}
          SCRAPER_HTTP_PROXY=${SCRAPER_HTTP_PROXY}
          PORT=3000
          NODE_ENV=production
          LOG_LEVEL=${LOG_LEVEL:-info}
          EOF

      - name: Upload config files to server
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$HETZNER_SSH_KEY" > "$HOME/.ssh/hetzner_key"
          chmod 600 "$HOME/.ssh/hetzner_key"
          ssh -i "$HOME/.ssh/hetzner_key" -o StrictHostKeyChecking=no "$HETZNER_USER@$HETZNER_HOST" 'mkdir -p ~/betintel/apps/api'
          scp -i "$HOME/.ssh/hetzner_key" -o StrictHostKeyChecking=no apps/api/docker-compose.yml "$HETZNER_USER@$HETZNER_HOST:~/betintel/apps/api/docker-compose.yml"
          scp -i "$HOME/.ssh/hetzner_key" -o StrictHostKeyChecking=no "$RUNNER_TEMP/api.env" "$HETZNER_USER@$HETZNER_HOST:~/betintel/apps/api/.env"

      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          # The server pulls the image directly from GHCR — no SCP transfer needed.
          # This avoids uploading a 1-2 GB tar.gz through the runner.
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}/betintel-api:latest
            docker network inspect app_network >/dev/null 2>&1 || docker network create app_network
            COMPOSE_FILE="$HOME/betintel/apps/api/docker-compose.yml"
            ENV_FILE="$HOME/betintel/apps/api/.env"
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d --no-deps api
            else
              docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d --no-deps api
            fi
            docker image prune -f