name: Build & Deploy API

on:
  push:
    branches: [main]
    paths: ['apps/api/**', 'packages/shared/**']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/betintel-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload Docker Compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: apps/api/docker-compose.yml
          target: betintel

      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            export GITHUB_REPO=${{ github.repository }}
            COMPOSE_FILE="$HOME/betintel/apps/api/docker-compose.yml"
            docker pull ghcr.io/${{ github.repository }}/betintel-api:latest
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose -f "$COMPOSE_FILE" up -d --no-deps api
            else
              docker compose -f "$COMPOSE_FILE" up -d --no-deps api
            fi