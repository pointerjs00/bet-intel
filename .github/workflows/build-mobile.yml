name: EAS Build

on:
  push:
    branches: [main]
    paths: ['apps/mobile/**']
  workflow_dispatch:
    inputs:
      platform:
        type: choice
        default: android
        options: [all, android, ios]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EAS_BUILD_NO_EXPO_GO_WARNING: 'true'
      EAS_NO_VCS: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vendor shared package for EAS
        run: |
          rm -rf apps/mobile/_vendor/shared
          mkdir -p apps/mobile/_vendor/shared/src
          # Copy TypeScript source — Metro resolves @betintel/shared via extraNodeModules
          # and transforms the TS files directly, so no compilation or dist/ needed.
          cp -R packages/shared/src/. apps/mobile/_vendor/shared/src/
          # Vendored package.json points main at TypeScript source
          echo '{"name":"@betintel/shared","version":"1.0.0","main":"src/index.ts"}' \
            > apps/mobile/_vendor/shared/package.json
          node -e "
            const fs = require('fs');
            const pkgPath = 'apps/mobile/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            // Remove @betintel/shared — resolved by Metro extraNodeModules, not npm
            delete pkg.dependencies['@betintel/shared'];
            delete pkg.packageManager;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "
          # Create a minimal package-lock.json so EAS detects npm (not yarn)
          echo '{"name":"mobile","version":"1.0.0","lockfileVersion":3,"requires":true,"packages":{}}' > apps/mobile/package-lock.json

      - name: Strip workspace config so EAS builder treats apps/mobile as standalone
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); delete pkg.workspaces; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          rm -f pnpm-workspace.yaml

      - name: Restore Firebase native config files
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
          IOS_GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          test -n "$ANDROID_GOOGLE_SERVICES_JSON" || { echo "Missing ANDROID_GOOGLE_SERVICES_JSON secret"; exit 1; }
          test -n "$IOS_GOOGLE_SERVICE_INFO_PLIST" || { echo "Missing IOS_GOOGLE_SERVICE_INFO_PLIST secret"; exit 1; }
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > apps/mobile/google-services.json
          printf '%s' "$IOS_GOOGLE_SERVICE_INFO_PLIST" > apps/mobile/GoogleService-Info.plist
          test -s apps/mobile/google-services.json || { echo "google-services.json was created empty"; exit 1; }
          test -s apps/mobile/GoogleService-Info.plist || { echo "GoogleService-Info.plist was created empty"; exit 1; }

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS
        run: eas build --platform ${{ inputs.platform || 'android' }} --non-interactive
        working-directory: apps/mobile