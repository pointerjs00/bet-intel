services:
  api:
    image: ghcr.io/pointerjs00/bet-intel/betintel-api:latest
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_URL: ${REDIS_URL}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: ${APP_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      NODE_ENV: ${NODE_ENV}
      TZ: UTC
      LOG_LEVEL: ${LOG_LEVEL}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY}
      SCRAPER_HTTP_PROXY: ${SCRAPER_HTTP_PROXY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_TUNED_MODEL_ID: ${OPENAI_TUNED_MODEL_ID}
      AI_PARSER: ${AI_PARSER}
      INTERNAL_ADMIN_KEY: ${INTERNAL_ADMIN_KEY}
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - redis
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app_network

volumes:
  redis_data:
  uploads_data:

networks:
  app_network:
    external: true